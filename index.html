 <!DOCTYPE html>
<html>
	<title>KBC GAME</title>
<link rel="stylesheet" href="./style.css" />
<script src="./js/index.js"></script>
<body onload="openWelcomeModal()">
<MAIN>
 <!-- Welcome Message Screen Modal -->
        <div class="modal-container" id="welcome-modal">
            <div class="modal-content-container">
                <h1>Namaste !!</h1>
                <br />
                <h1>Welcome to Mini KBC</h1>
                <br />
                <h3>Let's the Game Begin</h3>

                <div class="grade-details">
                    <p id="categoryCompleted"></p>
                </div>

                <div class="modal-button-container">
                    <button onclick="startGame()">Start KBC</button>
                </div>

                <br />
            </div>
        </div>

   <!-- Creating Main View Port -->
        <div class="game-quiz-container">
            <div class="game-details-container">
                <h1>Score : <span id="player-score"></span></h1>
                <h1>Question : <span id="question-number"></span></h1>
            </div>

            <div class="game-question-container">
                <span id="display-category"></span>
                <h1 id="display-question"></h1>
            </div>

            <div id="game-message">
                <span id="demo"> </span>
            </div>

            <div id="game-message">
                <span id="nextCategory"> </span>
            </div>

            <div class="game-options-container">
                <div class="answerbox">
                    <div id="multiple-options">
                    </div>
                </div>
            </div>
            <div class="next-button-container">
                <button onclick="closeScoreModal()">Restart Game</button>
            </div>
        </div>

<!-- Final message screen modal -->
<div class="modal-container" id="score-modal">
		<div class="modal-content-container">
			<h1 id="final-message"></h1>

			<div class="grade-details">
				<p id="categoryCompleted"></p>
				<p>Wrong Answers : <span id="wrong-answers"></span></p>
				<p>Right Answers : <span id="right-answers"></span></p>
			</div>
			<div class="modal-button-container">
				<button onclick="closeScoreModal()">Continue</button>
			</div>
		</div>
	</div>

</MAIN>
</body>
</html>
